name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1, v2). Leave blank for latest-only deploy.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          if [ -n "${{ github.event.inputs.version }}" ]; then
            mkdir -p "deploy/${{ github.event.inputs.version }}"
            cp -r dist/* "deploy/${{ github.event.inputs.version }}/"
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
