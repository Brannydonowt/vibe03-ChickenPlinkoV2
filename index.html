<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Egg Plinko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-viewport {
      position: relative;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      overflow: hidden;
    }
    #game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #game canvas {
      display: block;
      width: 100%; height: 100%;
    }

    /* HUD Overlay */
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      z-index: 10;
    }

    .hud-top {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 20px;
      gap: 16px;
    }

    .gold-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 20px;
      padding: 6px 16px;
      color: #FFD700;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.15s ease;
    }
    .gold-pill .coin-icon {
      width: 22px; height: 22px;
      background: radial-gradient(circle at 35% 35%, #FFE44D, #FFA500);
      border-radius: 50%;
      border: 2px solid #DAA520;
      flex-shrink: 0;
    }
    .gold-pill.punch {
      transform: scale(1.2);
    }
    .gold-pill.throb {
      transform: scale(1.35);
      box-shadow: 0 0 14px rgba(255,215,0,0.7);
    }

    .flying-coin {
      position: absolute;
      width: 20px; height: 20px;
      background: radial-gradient(circle at 35% 35%, #FFE44D, #FFA500);
      border-radius: 50%;
      border: 2px solid #DAA520;
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 0 6px rgba(255,215,0,0.6);
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .score-display {
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.15s ease;
    }
    .score-display.visible {
      opacity: 1;
    }

    .combo-display {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #FF6B35;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .combo-display.visible {
      opacity: 1;
    }

    .tap-prompt-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .tap-prompt-container.visible {
      opacity: 1;
    }

    .tap-prompt-text {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Lilita One', 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(28px, 7.5vw, 48px);
      font-weight: 900;
      color: #FFD700;
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
      -webkit-text-stroke: 2.5px #1a1a1a;
      paint-order: stroke fill;
      text-shadow:
        0 3px 0 #B8860B,
        0 5px 10px rgba(0,0,0,0.5),
        0 0 24px rgba(255,215,0,0.3);
      animation: tap-text-pulse 1.6s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes tap-text-pulse {
      0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
      50% { transform: translateX(-50%) scale(1.06); filter: brightness(1.15); }
    }

    .tap-icon-wrapper {
      position: absolute;
      top: 56%;
      left: 58%;
      transform: translate(-10%, 0%);
      animation: tap-icon-bounce 1.4s ease-in-out infinite;
      z-index: 1;
    }
    .tap-icon-wrapper img {
      width: clamp(80px, 22vw, 140px);
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    @keyframes tap-icon-bounce {
      0%, 100% { transform: translate(-10%, 0%) scale(1); }
      50% { transform: translate(-10%, -4%) scale(1.02); }
    }

    .screen-flash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease;
    }

    .edge-glow {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      box-shadow: inset 0 0 60px 20px rgba(255, 107, 53, 0.4);
      transition: opacity 0.3s ease;
    }

    /* Powerup Bar */
    .powerup-bar {
      display: flex;
      justify-content: center;
      padding: 4px 20px 0;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .powerup-bar.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .powerup-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,215,0,0.45);
      border-radius: 22px;
      padding: 7px 18px;
      color: #FFD700;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.15s ease, border-color 0.25s ease,
                  box-shadow 0.25s ease, opacity 0.25s ease;
    }
    .powerup-btn:active {
      transform: scale(0.95);
    }

    .powerup-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: rgba(255,215,0,0.2);
      border-radius: 50%;
      font-size: 13px;
      font-weight: 900;
      color: #FFE680;
      flex-shrink: 0;
    }

    .powerup-name {
      white-space: nowrap;
    }

    .powerup-cost {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.85;
      font-size: 13px;
    }
    .powerup-cost .mini-coin {
      width: 14px; height: 14px;
      background: radial-gradient(circle at 35% 35%, #FFE44D, #FFA500);
      border-radius: 50%;
      border: 1.5px solid #DAA520;
      flex-shrink: 0;
    }

    .powerup-btn.disabled {
      opacity: 0.35;
      pointer-events: none;
      border-color: rgba(255,255,255,0.15);
      color: #aaa;
    }
    .powerup-btn.disabled .powerup-icon {
      background: rgba(255,255,255,0.08);
      color: #999;
    }

    .powerup-btn.active {
      border-color: #FFD700;
      box-shadow: 0 0 16px rgba(255,215,0,0.5), inset 0 0 8px rgba(255,215,0,0.15);
      animation: powerup-glow 1.2s ease-in-out infinite;
    }
    .powerup-btn.active .powerup-name {
      color: #fff;
    }
    @keyframes powerup-glow {
      0%, 100% { box-shadow: 0 0 12px rgba(255,215,0,0.4), inset 0 0 6px rgba(255,215,0,0.1); }
      50% { box-shadow: 0 0 22px rgba(255,215,0,0.7), inset 0 0 10px rgba(255,215,0,0.2); }
    }

    /* Upgrade Bar */
    .upgrade-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 16px 20px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .upgrade-bar.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .upgrade-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,215,0,0.45);
      border-radius: 16px;
      padding: 10px 24px;
      color: #FFD700;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.15s ease, border-color 0.25s ease,
                  box-shadow 0.25s ease, opacity 0.25s ease;
    }
    .upgrade-btn:active {
      transform: scale(0.95);
    }

    .upgrade-label {
      font-size: 15px;
      white-space: nowrap;
    }

    .upgrade-cost {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      opacity: 0.9;
    }
    .upgrade-cost .mini-coin {
      width: 14px; height: 14px;
      background: radial-gradient(circle at 35% 35%, #FFE44D, #FFA500);
      border-radius: 50%;
      border: 1.5px solid #DAA520;
      flex-shrink: 0;
    }

    .upgrade-btn.disabled {
      opacity: 0.35;
      pointer-events: none;
      border-color: rgba(255,255,255,0.15);
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="game-viewport">
  <div id="game"></div>
  <div id="hud">
    <div class="hud-top">
      <div class="gold-pill">
        <div class="coin-icon"></div>
        <span id="gold-count">0</span>
      </div>
      <div class="score-display" id="score-display">
        <span id="score-count">0</span> pts
      </div>
    </div>
    <div class="powerup-bar" id="powerup-bar">
      <button class="powerup-btn" id="powerup-dupli-bounce">
        <span class="powerup-icon">x2</span>
        <span class="powerup-name">Dupli-Bounce!</span>
        <span class="powerup-cost"><span class="mini-coin"></span>1000</span>
      </button>
    </div>
    <div class="combo-display" id="combo-display">x1</div>
    <div class="tap-prompt-container" id="tap-prompt">
      <div class="tap-prompt-text">LAY YOUR EGG!</div>
      <div class="tap-icon-wrapper">
        <img src="sprites/left-click.png" alt="" />
      </div>
    </div>
    <div class="upgrade-bar" id="upgrade-bar">
      <button class="upgrade-btn" id="upgrade-buy-chicken">
        <span class="upgrade-label">Buy Chicken</span>
        <span class="upgrade-cost">
          <span class="mini-coin"></span>
          <span id="upgrade-chicken-cost">250</span>
        </span>
      </button>
    </div>
    <div class="screen-flash" id="screen-flash"></div>
    <div class="edge-glow" id="edge-glow"></div>
  </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
