<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Egg Plinko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-viewport {
      position: relative;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      overflow: hidden;
    }
    #game {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #game canvas {
      display: block;
      width: 100%; height: 100%;
    }

    /* HUD Overlay */
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      z-index: 10;
    }

    .hud-top-left {
      position: absolute;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 14px 16px;
      gap: 8px;
      z-index: 2;
    }

    .gold-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,215,0,0.5);
      border-radius: 22px;
      padding: 6px 14px 6px 8px;
      color: #FFD700;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.15s ease;
      pointer-events: auto;
    }
    .gold-pill .coin-icon {
      width: 26px; height: 26px;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    }
    .gold-pill.punch {
      transform: scale(1.2);
    }
    .gold-pill.throb {
      transform: scale(1.35);
      box-shadow: 0 0 14px rgba(255,215,0,0.7);
    }

    .upgrade-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,215,0,0.45);
      border-radius: 14px;
      cursor: pointer;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.2s ease;
      visibility: hidden;
    }
    .upgrade-toggle.visible {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
    }
    .upgrade-toggle:active {
      transform: scale(0.92);
    }
    .upgrade-toggle img {
      width: 22px; height: 22px;
      filter: brightness(0) saturate(100%) invert(82%) sepia(60%) saturate(500%) hue-rotate(5deg) brightness(104%) contrast(104%);
    }

    .hud-top-center {
      position: absolute;
      top: 0; left: 0; width: 100%;
      display: flex;
      justify-content: center;
      padding: 16px 20px;
    }

    .flying-coin {
      position: absolute;
      width: 20px; height: 20px;
      background: radial-gradient(circle at 35% 35%, #FFE44D, #FFA500);
      border-radius: 50%;
      border: 2px solid #DAA520;
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 0 6px rgba(255,215,0,0.6);
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .score-display {
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 16px;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.15s ease;
    }
    .score-display.visible {
      opacity: 1;
    }

    .combo-display {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #FF6B35;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .combo-display.visible {
      opacity: 1;
    }

    .tap-prompt-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .tap-prompt-container.visible {
      opacity: 1;
    }

    .tap-prompt-text {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Lilita One', 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(28px, 7.5vw, 48px);
      font-weight: 900;
      color: #FFD700;
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
      -webkit-text-stroke: 2.5px #1a1a1a;
      paint-order: stroke fill;
      text-shadow:
        0 3px 0 #B8860B,
        0 5px 10px rgba(0,0,0,0.5),
        0 0 24px rgba(255,215,0,0.3);
      animation: tap-text-pulse 1.6s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes tap-text-pulse {
      0%, 100% { transform: translateX(-50%) scale(1); filter: brightness(1); }
      50% { transform: translateX(-50%) scale(1.06); filter: brightness(1.15); }
    }

    .tap-icon-wrapper {
      position: absolute;
      top: 56%;
      left: 58%;
      transform: translate(-10%, 0%);
      animation: tap-icon-bounce 1.4s ease-in-out infinite;
      z-index: 1;
    }
    .tap-icon-wrapper img {
      width: clamp(80px, 22vw, 140px);
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    @keyframes tap-icon-bounce {
      0%, 100% { transform: translate(-10%, 0%) scale(1); }
      50% { transform: translate(-10%, -4%) scale(1.02); }
    }

    .screen-flash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease;
    }

    .edge-glow {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0;
      box-shadow: inset 0 0 60px 20px rgba(255, 107, 53, 0.4);
      transition: opacity 0.3s ease;
    }

    /* Powerup Bar */
    .powerup-bar {
      display: flex;
      justify-content: center;
      padding: 4px 20px 0;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .powerup-bar.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .powerup-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,215,0,0.45);
      border-radius: 22px;
      padding: 7px 18px;
      color: #FFD700;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.15s ease, border-color 0.25s ease,
                  box-shadow 0.25s ease, opacity 0.25s ease;
    }
    .powerup-btn:active {
      transform: scale(0.95);
    }

    .powerup-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      background: rgba(255,215,0,0.2);
      border-radius: 50%;
      font-size: 13px;
      font-weight: 900;
      color: #FFE680;
      flex-shrink: 0;
    }

    .powerup-name {
      white-space: nowrap;
    }

    .powerup-cost {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.85;
      font-size: 13px;
    }
    .powerup-cost .mini-coin {
      width: 14px; height: 14px;
      background: radial-gradient(circle at 35% 35%, #FFE44D, #FFA500);
      border-radius: 50%;
      border: 1.5px solid #DAA520;
      flex-shrink: 0;
    }

    .powerup-btn.disabled {
      opacity: 0.35;
      pointer-events: none;
      border-color: rgba(255,255,255,0.15);
      color: #aaa;
    }
    .powerup-btn.disabled .powerup-icon {
      background: rgba(255,255,255,0.08);
      color: #999;
    }

    .powerup-btn.active {
      border-color: #FFD700;
      box-shadow: 0 0 16px rgba(255,215,0,0.5), inset 0 0 8px rgba(255,215,0,0.15);
      animation: powerup-glow 1.2s ease-in-out infinite;
    }
    .powerup-btn.active .powerup-name {
      color: #fff;
    }
    @keyframes powerup-glow {
      0%, 100% { box-shadow: 0 0 12px rgba(255,215,0,0.4), inset 0 0 6px rgba(255,215,0,0.1); }
      50% { box-shadow: 0 0 22px rgba(255,215,0,0.7), inset 0 0 10px rgba(255,215,0,0.2); }
    }

    /* Upgrade Panel Backdrop */
    .upgrade-backdrop {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 30;
    }
    .upgrade-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* Upgrade Panel (slide-up sheet) */
    .upgrade-panel {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      max-height: 65%;
      background: rgba(18,18,30,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 2px solid rgba(255,215,0,0.35);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 31;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .upgrade-panel.open {
      transform: translateY(0);
      pointer-events: auto;
    }

    .upgrade-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .upgrade-panel-title {
      font-family: 'Lilita One', 'Impact', sans-serif;
      font-size: 22px;
      color: #FFD700;
      letter-spacing: 1px;
    }
    .upgrade-panel-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.2s ease;
    }
    .upgrade-panel-close:active {
      background: rgba(255,255,255,0.18);
    }
    .upgrade-panel-close img {
      width: 16px; height: 16px;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }

    .upgrade-panel-list {
      padding: 10px 14px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .upgrade-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      transition: border-color 0.2s ease;
    }

    .upgrade-item-icon {
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,215,0,0.12);
      border-radius: 12px;
      font-size: 24px;
      flex-shrink: 0;
    }

    .upgrade-item-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .upgrade-item-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upgrade-item-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upgrade-item-level {
      font-size: 11px;
      color: rgba(255,215,0,0.7);
      font-weight: 600;
    }
    .upgrade-item-level:empty {
      display: none;
    }

    .upgrade-item-count {
      font-size: 11px;
      color: rgba(255,215,0,0.7);
      font-weight: 600;
    }

    .upgrade-item-buy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 88px;
      height: 40px;
      background: #4CAF50;
      border: none;
      border-radius: 12px;
      padding: 0 14px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      flex-shrink: 0;
      transition: background 0.2s ease, transform 0.12s ease, opacity 0.2s ease;
    }
    .upgrade-item-buy:active {
      transform: scale(0.95);
    }
    .upgrade-item-buy .buy-coin {
      width: 18px; height: 18px;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
    }
    .upgrade-item-buy.cannot-afford {
      background: #555;
      color: #999;
      cursor: default;
    }
    .upgrade-item-buy.cannot-afford .buy-coin {
      opacity: 0.5;
    }

    .upgrade-item.coming-soon {
      opacity: 0.4;
      pointer-events: none;
    }
    .upgrade-item.coming-soon .upgrade-item-icon {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.3);
      font-weight: 700;
    }
    .upgrade-item-buy.locked {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.35);
      cursor: default;
      pointer-events: none;
      min-width: 72px;
      font-size: 13px;
    }

    /* Subtle tap prompt (post-FTUE overview mode) */
    .tap-prompt-subtle {
      position: absolute;
      bottom: 18%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      animation: subtle-bob 2.4s ease-in-out infinite;
    }
    .tap-prompt-subtle.visible {
      opacity: 0.7;
    }
    .tap-prompt-subtle img {
      width: 40px;
      height: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    .tap-prompt-subtle span {
      font-family: 'Lilita One', 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
      letter-spacing: 0.5px;
    }
    @keyframes subtle-bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-3px); }
    }
  </style>
</head>
<body>
  <div id="game-viewport">
  <div id="game"></div>
  <div id="hud">
    <div class="hud-top-left">
      <div class="gold-pill">
        <img class="coin-icon" src="sprites/icons/Coin.svg" alt="" />
        <span id="gold-count">0</span>
      </div>
      <button class="upgrade-toggle" id="upgrade-toggle">
        <img src="sprites/icons/Arrow 2 Up.svg" alt="Upgrades" />
      </button>
    </div>
    <div class="hud-top-center">
      <div class="score-display" id="score-display">
        <span id="score-count">0</span> pts
      </div>
    </div>
    <div class="powerup-bar" id="powerup-bar">
      <button class="powerup-btn" id="powerup-dupli-bounce">
        <span class="powerup-icon">x2</span>
        <span class="powerup-name">Dupli-Bounce!</span>
        <span class="powerup-cost"><span class="mini-coin"></span>1000</span>
      </button>
    </div>
    <div class="combo-display" id="combo-display">x1</div>
    <div class="tap-prompt-container" id="tap-prompt">
      <div class="tap-prompt-text">LAY YOUR EGG!</div>
      <div class="tap-icon-wrapper">
        <img src="sprites/left-click.png" alt="" />
      </div>
    </div>
    <div class="tap-prompt-subtle" id="tap-prompt-subtle">
      <img src="sprites/left-click.png" alt="" />
      <span>Tap to lay!</span>
    </div>
    <div class="upgrade-backdrop" id="upgrade-backdrop"></div>
    <div class="upgrade-panel" id="upgrade-panel">
      <div class="upgrade-panel-header">
        <span class="upgrade-panel-title">Upgrades</span>
        <button class="upgrade-panel-close" id="upgrade-close">
          <img src="sprites/icons/X Button.svg" alt="Close" />
        </button>
      </div>
      <div class="upgrade-panel-list" id="upgrade-list">
      </div>
    </div>
    <div class="screen-flash" id="screen-flash"></div>
    <div class="edge-glow" id="edge-glow"></div>
  </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
